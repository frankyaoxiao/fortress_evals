models:
  - id: "allenai/OLMo-3-7B-Think"
    short_name: "7B-Think-step0025"
    revision: "step_0025"
  - id: "allenai/OLMo-3-7B-Think"
    short_name: "7B-Think-step0050"
    revision: "step_0050"

evals:
  - task: "inspect_evals/ifeval"
  - task: "inspect_evals/math"
    limit: 300
    task_args:
      shuffle: false
  - task: "inspect_evals/mbpp"
    sandbox: "local"

vllm:
  tensor_parallel_size: 1
  max_connections: 10    # per eval — total concurrent = this × num_evals

slurm:
  partition: "compute"
  max_concurrent: 8
  timeout: "4:00:00"
  job_name: "caps"
  gpus_per_node: 8
  cpus_per_node: 64
