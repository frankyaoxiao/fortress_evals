models:
  - id: "allenai/OLMo-3-32B-Think-SFT"
    short_name: "Think-SFT"
  - id: "allenai/OLMo-3-32B-Think-DPO"
    short_name: "Think-DPO"
  - id: "allenai/OLMo-3-32B-Think"
    short_name: "Think"
  - id: "allenai/OLMo-3.1-32B-Think"
    short_name: "3.1-Think"

sampling:
  temperature: 0.6
  top_p: 0.95
  max_tokens: 3072
  n: 100

dataset:
  arrow_path: "/data/artifacts/hf_cache/datasets/ScaleAI___fortress_public/default/0.0.0/0c096becbc75bb12065c8059a53960c7f0d4d35c/fortress_public-train.arrow"
  num_prompts: 100
  seed: 42

scoring:
  model: "gpt-5-mini"
  reasoning_effort: "medium"
  max_completion_tokens: 500
  max_concurrent: 200

vllm:
  tensor_parallel_size: 4

slurm:
  partition: "compute"
  max_concurrent: 4
  timeout: "6:00:00"
  job_name: "fortress-32b"
  gpus_per_node: 8
  cpus_per_node: 64

paths:
  prompts: "data/fortress/sampled_prompts.jsonl"
